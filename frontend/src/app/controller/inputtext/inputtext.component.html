<label class="form-label">
  {{ label }}
</label>

<input [type]="type" class="form-control" [placeholder]="placeholder" [formControl]="control">

<div class="text-danger mt-1" *ngIf="control?.touched && control?.invalid">

    <small *ngIf="control?.errors?.['required']">
    {{ label }} is required
  </small>

    <small *ngIf="control?.errors?.['email']">
    Invalid email
  </small>

</div>
